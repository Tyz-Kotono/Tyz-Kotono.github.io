baseURL = 'https://tyz-kotono.github.io/'
languageCode = 'zh-cn'
title = 'Modern Graphics Engine Guide'
theme = 'PaperMod'

[params]
  # 启用搜索功能
  ShowSearch = true
  # 启用代码高亮
  ShowCodeCopyButtons = true
  # 显示阅读时间
  ShowReadingTime = true
  # 显示字数统计
  ShowWordCount = true
  # 显示目录
  ShowToc = true
  # 启用自动目录
  TocOpen = true
  # 显示最后修改时间
  ShowLastMod = true
  # 显示分享按钮
  ShowShareButtons = true
  # 显示相关文章
  ShowRelatedContent = true
  # 显示评论
  ShowComments = false
  # 显示面包屑导航
  ShowBreadCrumbs = true
  # 显示页面导航
  ShowPageNav = true
  # 显示返回顶部按钮
  ShowBackToTop = true
  # 显示标签
  ShowTags = true
  # 显示分类
  ShowCategories = true
  # 显示系列文章
  ShowSeries = true
  # 显示作者信息
  ShowAuthor = true
  # 作者名称
  author = 'Tyz-Kotono'
  # 作者描述
  authorDesc = 'UE技术开发者'
  # 作者头像
  # authorImage = '<url / path>'
  # 作者网站
  authorURL = 'https://github.com/Tyz-Kotono'
  # 网站图标
  # favicon = '<url / path>'
  # 网站描述
  description = 'UE技术开发者的个人技术博客'
  # 关键词
  keywords = ['UE', 'Unreal Engine', '技术博客', '游戏开发', 'C++']
  # 默认主题模式
  defaultTheme = 'auto'
  # 禁用特殊字符转义
  disableSpecial1stPost = false
  # 禁用滚动到顶部
  disableScrollToTop = false
  # 禁用切换主题
  disableSwitchThemes = false
  # 显示完整内容
  ShowFullTextinRSS = false

[params.assets]
  # 禁用指纹
  disableFingerprinting = false
  # 禁用缩放
  disableHLJS = false

[params.label]
  text = 'Modern Graphics Engine Guide'

