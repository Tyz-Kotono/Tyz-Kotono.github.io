[markup]
  [markup.highlight]
    noClasses = false
    noHl = false
    style = 'github'
    tabWidth = 2
    lineNos = true
    lineNumbersInTable = true
    guessSyntax = true
    noInline = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      hardWraps = false
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true

  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 1
